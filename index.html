<html lang="en">
<head>

<style>

@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

  --font-1: "Black Ops One", system-ui;
}

  box-sizing: border-box;

}

@font-face {

}

}
@font-face {

}

body{
  background:radial-gradient(circle at center,#0f172a,#000);
  width: 100%;
  height: 100vh;
  overflow: hidden;
}
.header{background: none; border:0px solid #bbb;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;}
.logo{cursor: pointer;width: 20%;transition: .3s;}
.logo:hover{
  scale: 1.05;
}
.date-box{display:flex;align-items:center;justify-content: center;}
.date-btn{
  cursor:pointer;
  font-size:25px;
  text-transform: uppercase;
  font-family: var(--font-1);
  padding: 6px 15px;
  border: none;
  display: flex;
  align-items:center;
  background: none;
  justify-content: center;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color: white;
  transition: .3s ease-in-out;
}
#prevDate{
  border-right: none;
  border-radius: 20px 0 0 20px;
  font-family: 'MyFont1';
}
#nextDate{
  border-left: none;
  border-radius: 0 20px 20px 0;
  font-family: 'MyFont1';
}
.date-btn:hover{
  scale: 1.05;
}
#currentDate{
  min-width:160px;
  text-align:center;
  border-left: none;
  border-right: none;
  padding:1.1px 10px;
  font-family: 'MyFont9';
  font-weight:bold;
  font-size: 30px;
  margin-top: -2px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  background-clip: text;
  color: transparent;
  transition: .3s ease-in-out;
}
#currentDate:hover{
  font-size: 32px;
}
.container{display:flex;gap:15px;align-items:flex-start;padding: 2rem 3rem;}
.listbox-panel{flex:0}
.left{width:305px}
.right{flex:1}
.title{background:#b71c1c;color:#fff;text-align:center;padding:5px 0 0 0;font-size:30px;font-weight:100;width: 300px;border-radius: 20px 20px 0 0;cursor: pointer;}
.panel{background:#ffdede;border:2px solid #b71c1c;padding-top:10px;width: 300px;display: flex;flex-direction: column;align-items: center;}
input,textarea{width:90%;padding:10px 20px;margin-bottom:8px;border-radius: 10px;outline:none;border:1px solid #aaa;font-family: 'MyFont7';font-size: 20px;}
textarea{height:70px;resize:none}
input:focus,textarea:focus{border: 2px solid #b71c1c;color: #b71c1c;font-weight: 600;}
.btns{display:flex;gap:0px;width: 100%;border-top:2px solid #b71c1c;}
.btns button{flex:1;padding:5px;border: none; background:#fff;color:#b71c1c;cursor:pointer;font-size:20px;transition: .3s;font-family: 'MyFont8';letter-spacing: 1px;}
#updateBtn{border-right: 2px solid #b71c1c;border-left: 2px solid #b71c1c;}
.btns button:hover{background: #b71c1c;color: #fff;}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
thead{background:#b71c1c;color:#fff}
.small-wrap{height:455px;width: 500px;}
.big-wrap{height:560px;overflow:auto}
.selected{background:#66df84 !important}
.totalbox{display:flex;margin-top:0px}
.totalbox div{padding:10px;border:1px solid #8b0000}
.totaltitle{background:#b71c1c;color:#fff;font-weight:bold;width:450px}
.totalvalue{background:#fff;width:50px;text-align:center}

.header-tools{display:flex;gap:20px;align-items:center}
.header-tools input{width:250px;margin:0;padding:10px}
.header-tools button{padding:10px 14px;border:none;cursor:pointer;border-radius:6px;background:#b71c1c;color:#fff}

.dark{background:#1e1e1e;color:#fff}
.dark .header,.dark .panel,.dark table,.dark .totalvalue{background:#2d2d2d;color:#fff}
.dark input,.dark textarea{background:#3a3a3a;color:#fff;border:1px solid #666}
.dark th{background:#8b0000}
.dark td{border-color:#555}
.dark #currentDate{background:#444;color:#fff}


.right table{table-layout:fixed}
.right th:nth-child(1), .right td:nth-child(1){width:120px}
.right th:nth-child(2), .right td:nth-child(2){width:180px}
.right th:nth-child(3), .right td:nth-child(3){width:120px}
.right th:nth-child(4), .right td:nth-child(4){width:auto}


.purchase-title{background:#3bb71c;color:#fff;text-align:center;padding:5px 0 0 0;font-size:30px;font-weight:100;margin-top:15px;border: 2px solid #3bb71c;border-radius: 20px 20px 0 0;cursor: pointer;}
.purchase-panel{background:#e2f0c8;border:2px solid #3bb71c;padding-top:10px;width: 300px;display: flex;flex-direction: column;align-items: center;}

#pitem,#pamount,#pdetail{width:90%;padding:10px 20px;margin-bottom:8px;border-radius: 10px;outline:none;border:1px solid #aaa;font-family: 'MyFont7';font-size: 20px;}
#pdetail{height:70px;resize:none}
#pitem:focus,#pamount:focus,#pdetail:focus{border: 2px solid #3bb71c;color: #3bb71c;font-weight: 600;}
.purchase-head{background:#3bb71c !important}

#clearAllBtn,

}

#darkModeBtn{

}

#clearAllBtn:hover{

}

#darkModeBtn:hover{

.cash-panel{width:500px;margin-left:10px}
.cash-header,.cash-row-label,.cash-total-label,.cash-value{
background:#f7941d;color:#fff;font-family:'MyFont1';text-align:center;border:1px solid #b96a0d;}
.cash-header{font-size:42px;padding:10px}
.cash-grid{display:grid;grid-template-columns:100px 150px 220px;}
.cash-row-label{font-size:32px;padding:10px;margin: 5px 0;}

.cash-total-label{grid-column:1/3;font-size:40px;padding:10px}
.cash-grand{background:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;border:1px solid #aaa;margin-left: -50px;}

</style>

<script>

function showCustomAlert(message){
 const box=document.createElement("div");
 box.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100000";
 box.innerHTML=`
 <div style="min-width:340px;background:rgba(255,255,255,.15);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.25);padding:22px;border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.35);animation:pop .2s ease">
   <div style="font-size:20px;color:white;margin-bottom:12px">🔔 Message</div>
   <div style="color:white;margin-bottom:18px">${message}</div>
   <div style="text-align:right">
      <button id="caok" style="padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;cursor:pointer">OK</button>
   </div>
 </div>`;
 document.body.appendChild(box);
 box.querySelector("#caok").onclick=()=>box.remove();
}
window.alert=showCustomAlert;

let data = JSON.parse(localStorage.getItem("salesData") || "[]");


function passwordInputBox(message){
  return new Promise((resolve)=>{
    const overlay=document.createElement("div");
    overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:99999;animation:fadeIn .25s ease";

    const style=document.createElement("style");
    style.textContent=`
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    `;
    document.head.appendChild(style);

    overlay.innerHTML=`
      <div style="animation:popIn .25s ease;background:rgba(255,255,255,.15);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.25);padding:24px;border-radius:20px;min-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.35)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;color:#fff;font-size:20px;font-weight:bold">
          🔒 <span>${message}</span>
        </div>

        <div style="position:relative">
          <input id="pwdBoxInput" type="password" placeholder="Enter Password"
          style="width:100%;padding:13px 45px 13px 13px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:white;border-radius:12px;outline:none;transition:.25s">
          
          <span id="togglePwd"
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px">👁</span>
        </div>

        <div style="margin-top:18px;display:flex;justify-content:flex-end;gap:10px">
          <button id="pwdCancel" style="padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#777,#555);color:white;cursor:pointer;transition:.25s">Cancel</button>
          <button id="pwdOk" style="padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#00c6ff,#0072ff);color:white;cursor:pointer;transition:.25s">OK</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    const inp=overlay.querySelector("#pwdBoxInput");
    const eye=overlay.querySelector("#togglePwd");
    const okBtn=overlay.querySelector("#pwdOk");
    const cancelBtn=overlay.querySelector("#pwdCancel");

    inp.focus();

    inp.onfocus=()=>{
      inp.style.borderColor="#4facfe";
      inp.style.boxShadow="0 0 0 4px rgba(79,172,254,.25)";
    };

    inp.onblur=()=>{
      inp.style.borderColor="rgba(255,255,255,.25)";
      inp.style.boxShadow="none";
    };

    eye.onclick=()=>{
      if(inp.type==="password"){
        inp.type="text";
        eye.textContent="🙈";
      }else{
        inp.type="password";
        eye.textContent="👁";
      }
    };

    [okBtn,cancelBtn].forEach(btn=>{
      btn.onmouseenter=()=>btn.style.transform="translateY(-2px) scale(1.04)";
      btn.onmouseleave=()=>btn.style.transform="translateY(0) scale(1)";
    });

    function close(v){
      overlay.remove();
      resolve(v);
    }

    okBtn.onclick=()=>close(inp.value);
    cancelBtn.onclick=()=>close(null);

    inp.addEventListener("keydown",(e)=>{
      if(e.key==="Enter") close(inp.value);
      if(e.key==="Escape") close(null);
    });
  });
}

let selectedIndex = -1;
let selectedDate = new Date();

function formatDate(d){
 let dd=String(d.getDate()).padStart(2,'0');
 let mm=String(d.getMonth()+1).padStart(2,'0');
 let yy=d.getFullYear();
 return `${dd}-${mm}-${yy}`;
}

function save(){
 localStorage.setItem("salesData",JSON.stringify(data));
}

async function checkPastDatePassword(){
 let today=new Date();
 today.setHours(0,0,0,0);

 let current=new Date(selectedDate);
 current.setHours(0,0,0,0);

 if(current.getTime()===today.getTime()) return true;

 let pwd=await passwordInputBox("Past date data modify karne ke liye password enter kare:");
 if(pwd===null) return false;

 let savedPwd=localStorage.getItem("clearPassword") || "Radhe Radhe";

 if(pwd!==savedPwd){
   alert("Wrong Password");
   return false;
 }
 return true;
}

function showDate(){
 document.getElementById("currentDate").textContent=formatDate(selectedDate);
 renderAll();
}

document.getElementById("prevDate").onclick=()=>{
 selectedDate.setDate(selectedDate.getDate()-1);
 showDate();
};

document.getElementById("nextDate").onclick=()=>{
 let today=new Date();
 today.setHours(0,0,0,0);

 let current=new Date(selectedDate);
 current.setHours(0,0,0,0);

 if(current.getTime() >= today.getTime()){
   alert("Aaj ki date se aage nahi ja sakte.");
   return;
 }

 selectedDate.setDate(selectedDate.getDate()+1);
 showDate();
};

function renderMain(){
 let tb=document.getElementById("list1");
 tb.innerHTML="";
 data.forEach((r,i)=>{
   let tr=document.createElement("tr");
   if(i===selectedIndex) tr.classList.add("selected");
   tr.innerHTML=`
   <td>${r.date}</td>
   <td>${r.item}</td>
   <td>${r.amount}</td>
   <td>${r.detail}</td>`;

   tr.onclick=()=>{
      selectedIndex=i;
      document.getElementById("item").value=r.item;
      document.getElementById("amount").value=r.amount;
      document.getElementById("detail").value=r.detail;
      renderMain();
   };
   tb.appendChild(tr);
 });
}

function renderDateTable(){
 let tb=document.getElementById("list2");
 tb.innerHTML="";
 let total=0;
 let d=formatDate(selectedDate);

 data.filter(x=>x.date===d).forEach(r=>{
   let tr=document.createElement("tr");
   tr.innerHTML=`<td style="width:300px;text-align:left;font-size:20px;text-transform: uppercase;font-family:'MyFont3';font-weight:100;"">${r.item}</td><td style="width:200px;text-align:right;font-size:20px;text-transform: uppercase;font-family:'MyFont3';font-weight:100;">${r.amount}</td>`;
   tr.onclick=()=>{
      let idx=data.indexOf(r);
      selectedIndex=idx;
      document.getElementById("item").value=r.item;
      document.getElementById("amount").value=r.amount;
      document.getElementById("detail").value=r.detail;
   };
   tb.appendChild(tr);

   let n=parseFloat(r.amount);
   if(!isNaN(n)) total+=n;

/* ===== Excel Button Add-on (No Existing Code Modified) ===== */
(function(){
const _ow=window.open;
window.open=function(){
 const w=_ow.apply(this,arguments);
 const t=setInterval(()=>{
  try{
   if(!w.document||!w.document.body)return;
   if(w.document.getElementById("__excelAddon")){clearInterval(t);return;}
   const saleBox=w.document.getElementById("searchBox");
   const purBox=w.document.getElementById("purchaseSearchBox");
   function add(btnAfter,isPurchase){
     const b=w.document.createElement("button");
     b.id="__excelAddon";
     b.textContent="📊 Excel";
     b.style.cssText="padding:8px 12px;margin-left:8px;cursor:pointer";
     btnAfter.insertAdjacentElement("afterend",b);
     b.onclick=function(){
       const table=isPurchase?w.document.getElementById("purchaseTable"):w.document.getElementById("salesTable");
       let csv=[];
       table.querySelectorAll("tr").forEach(tr=>{
         if(tr.style.display==="none")return;
         let row=[...tr.children].map(td=>'"'+td.innerText.replace(/"/g,'""')+'"');
         csv.push(row.join(","));
       });
       const blob=new Blob([csv.join("\n")],{type:"text/csv"});
       const a=w.document.createElement("a");
       a.href=URL.createObjectURL(blob);
       a.download=isPurchase?"purchase_data.csv":"sales_data.csv";
       a.click();
     };
   }
   if(saleBox) add(saleBox,false);
   if(purBox) add(purBox,true);
   clearInterval(t);
  }catch(e){}
 },200);
 return w;
};
})();

function isTodayDate(){
 let t=new Date(); t.setHours(0,0,0,0);
 let c=new Date(selectedDate); c.setHours(0,0,0,0);
 return t.getTime()===c.getTime();
}

function cashKey(){ return "cashDetail_"+formatDate(selectedDate); }

let originalCash={};

function drawTotals(){
 let total=0;
 document.querySelectorAll('.cashQty').forEach(inp=>{
   const d=+inp.dataset.note;
   const q=+inp.value||0;
   const v=d*q;
   document.getElementById('v'+d).textContent=v;
   total+=v;
 });
 document.getElementById('cashGrand').textContent=total;
}

function loadCash(){
 originalCash=JSON.parse(localStorage.getItem(cashKey())||"{}");
 document.querySelectorAll('.cashQty').forEach(inp=>{
   inp.value=originalCash[inp.dataset.note]||"";
 });
 drawTotals();
 document.getElementById('cashDoneBtn').style.display='none';
}

function saveCash(){
 let data={};
 document.querySelectorAll('.cashQty').forEach(inp=>{
   data[inp.dataset.note]=inp.value||"";
 });
 localStorage.setItem(cashKey(),JSON.stringify(data));
 originalCash=data;
}

document.querySelectorAll('.cashQty').forEach(inp=>{
 inp.addEventListener('input',()=>{
   drawTotals();

   if(isTodayDate()){
      saveCash();
      return;
   }

   document.getElementById('cashDoneBtn').style.display='block';
 });
});

const oldShowDate=showDate;
showDate=function(){

};

window.addEventListener('beforeunload',()=>{
 if(!isTodayDate()){

      inp.value=originalCash[inp.dataset.note]||"";
   });
 }
});
